name: Daily OptiBot Update

on:
  schedule:
    - cron: '17 23 * * *'  
      timezone: 'Asia/Ho_Chi_Minh'
  workflow_dispatch: {}    

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t renew-docs-ob .

      - name: Run job in Docker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VECTOR_STORE_ID: ${{ secrets.VECTOR_STORE_ID }}
          ZENDESK_BASE_URL: ${{ vars.ZENDESK_BASE_URL || 'https://optisigns.com' }}
          MAX_ARTICLES: ${{ vars.MAX_ARTICLES || '0' }}
        run: |
          docker run --rm \
            -e OPENAI_API_KEY \
            -e VECTOR_STORE_ID \
            -e ZENDESK_BASE_URL \
            -e MAX_ARTICLES \
            renew-docs-ob
