name: Daily OptiBot Update

on:
  schedule:
    - cron: '0 16 * * *'   
  workflow_dispatch: {}    

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t renew-docs-ob .

      - name: Run job in Docker
        run: |
          docker run --rm \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e VECTOR_STORE_ID="${{ secrets.VECTOR_STORE_ID }}" \
            -e ZENDESK_BASE_URL="${{ vars.ZENDESK_BASE_URL || 'https://support.optisigns.com' }}" \
            -e MAX_ARTICLES="${{ vars.MAX_ARTICLES || '0' }}" \
            renew-docs-ob